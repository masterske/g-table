<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Shared Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
            text-align: center;
        }
        table {
            margin: 0 auto; /* Centers the table */
            border-collapse: collapse;
            width: 90%;
            max-width: 600px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Adds a subtle shadow */
        }
        th, td {
            border: 1px solid #dddddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #0056b3;
            color: white;
        }
    </style>
</head>
<body>

    <h2>Here is our table!</h2>

    <table>
        <tr>
            <th>Column 1</th>
            <th>Column 2</th>
            <th>Column 3</th>
        </tr>
        <tr>
            <td>Row 1 Data</td>
            <td>Row 1 Data</td>
            <td>Row 1 Data</td>
        </tr>
        <tr>
            <td>Row 2 Data</td>
            <td>Row 2 Data</td>
            <td>Row 2 Data</td>
        </tr>
    </table>

</body>
</html>
